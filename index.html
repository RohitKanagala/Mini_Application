<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 25px 40px;
      border-radius: 12px;
      box-shadow: 0px 6px 12px rgba(0,0,0,0.1);
      width: 450px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      color: #444;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    input[type="radio"], input[type="checkbox"] {
      width: auto;
      margin-right: 5px;
    }

    button {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
    }

    button:hover {
      background: #0056b3;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Student Registration Form</h2>
    <form id="registrationForm" method="POST" action="http://localhost:3000/submit">
      
      <!-- Name -->
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required>
      <div class="error" id="nameError">Name is required (min 3 characters).</div>

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>
      <div class="error" id="emailError">Enter a valid email address.</div>

      <!-- Password -->
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>
      <div class="error" id="passwordError">Password must be at least 6 characters.</div>

      <!-- Age -->
      <label for="age">Age</label>
      <input type="number" id="age" name="age" min="10" max="100" required>
      <div class="error" id="ageError">Enter a valid age (10–100).</div>

      <!-- Gender -->
      <label>Gender</label>
      <input type="radio" name="gender" value="Male" required> Male
      <input type="radio" name="gender" value="Female"> Female
      <input type="radio" name="gender" value="Other"> Other

      <!-- Date of Birth -->
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob" required>

      <!-- Phone -->
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit number" required>
      <div class="error" id="phoneError">Enter a valid 10-digit phone number.</div>

      <!-- Address -->
      <label for="address">Address</label>
      <textarea id="address" name="address" rows="3" placeholder="Enter your address"></textarea>

      <!-- Department -->
      <label for="department">Department</label>
      <select id="department" name="department" required>
        <option value="">Select Department</option>
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
      </select>

      <!-- Hobbies -->
      <label>Hobbies</label>
      <input type="checkbox" name="hobbies" value="Reading"> Reading
      <input type="checkbox" name="hobbies" value="Sports"> Sports
      <input type="checkbox" name="hobbies" value="Music"> Music
      <input type="checkbox" name="hobbies" value="Traveling"> Traveling

      <!-- File Upload -->
      <label for="profilePic">Upload Profile Picture</label>
      <input type="file" id="profilePic" name="profilePic" accept="image/*">

      <!-- Submit -->
      <button type="submit">Register</button>
    </form>
  </div>

  <script src="validate.js"></script>
</body>
</html>
